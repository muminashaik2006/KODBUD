<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Job Application Form</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Playfair Display', serif;
    font-style:italic;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#2c003e,#5a189a,#7b2cbf);
    padding:20px;
}

.container{
    width:100%;
    max-width:550px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#5a189a;
    margin-bottom:25px;
    font-size:32px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#4a148c;
    font-weight:bold;
    font-size:17px;
}

input,
textarea{
    width:100%;
    padding:12px;
    border:2px solid #c77dff;
    border-radius:10px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

input:focus,
textarea:focus{
    border-color:#7b2cbf;
    box-shadow:0 0 10px rgba(123,44,191,0.3);
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#7b2cbf;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5a189a;
    transform:scale(1.03);
}

.error{
    color:red;
    margin-top:5px;
    font-size:14px;
}

.success{
    color:green;
    text-align:center;
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <h2>Job Application Form</h2>

    <form id="applicationForm">

        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">
            <div class="error" id="nameError"></div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="text" id="email" placeholder="Enter your email">
            <div class="error" id="emailError"></div>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="text" id="phone" placeholder="Enter your phone number">
            <div class="error" id="phoneError"></div>
        </div>

        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" placeholder="Write your message here"></textarea>
            <div class="error" id="messageError"></div>
        </div>

        <button type="submit">Submit Application</button>

        <div class="success" id="successMessage"></div>

    </form>

</div>

<script>

document.getElementById("applicationForm").addEventListener("submit", function(event){

    event.preventDefault();

    document.getElementById("nameError").innerHTML = "";
    document.getElementById("emailError").innerHTML = "";
    document.getElementById("phoneError").innerHTML = "";
    document.getElementById("messageError").innerHTML = "";
    document.getElementById("successMessage").innerHTML = "";

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let message = document.getElementById("message").value.trim();

    let valid = true;

    if(name === ""){
        document.getElementById("nameError").innerHTML = "Please enter your name";
        valid = false;
    }

    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if(email === ""){
        document.getElementById("emailError").innerHTML = "Please enter your email";
        valid = false;
    }
    else if(!email.match(emailPattern)){
        document.getElementById("emailError").innerHTML = "Enter a valid email address";
        valid = false;
    }

    let phonePattern = /^[0-9]{10}$/;

    if(phone === ""){
        document.getElementById("phoneError").innerHTML = "Please enter your phone number";
        valid = false;
    }
    else if(!phone.match(phonePattern)){
        document.getElementById("phoneError").innerHTML = "Phone number must contain 10 digits";
        valid = false;
    }

    if(message === ""){
        document.getElementById("messageError").innerHTML = "Please enter your message";
        valid = false;
    }

    if(valid){
        document.getElementById("successMessage").innerHTML =
        "Application Submitted Successfully ✔";

        document.getElementById("applicationForm").reset();
    }

});

</script>

</body>
</html>
